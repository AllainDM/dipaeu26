<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <title>Ходы</title>
    <style>
        /* Контейнер для кнопок */
        #turnNavigation {
            display: flex;
            flex-wrap: wrap;
            gap: 5px; 
            padding: 10px;
            background: #f0f0f0; 
            border-bottom: 2px solid #ccc;
            justify-content: flex-start;
        }

        /* Переопределяем огромные размеры твоего .btn для навигации */
        #turnNavigation .btn {
            min-width: auto;   /* Сбрасываем 160px */
            flex: none;        /* Сбрасываем растягивание */
            max-width: none;
            padding: 5px 10px;
            min-height: 35px;  /* Чуть компактнее по высоте */
        }

        /* Кнопки с цифрами — делаем их квадратными */
        .nav-number {
            width: 40px;
            justify-content: center;
        }

        /* Кнопки Вперед/Назад — делаем чуть шире цифр */
        .nav-wide {
            padding: 5px 20px !important;
        }

        .map-wrapper { margin: 15px 0; text-align: left; }
        #mainMap { max-width: 80%; border: 1px solid #000; }
    </style>
</head>

            <li><a href="links.html">Ссылки</a></li>
            <li><a href="log.html">Лог</a></li>
        </ul>
    </header>

    <div id="turnNavigation"></div>

    </div>
