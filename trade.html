        function computeCostStats(num) {
            const data = costData[num];
            const values = [];
            data.goods.forEach(row => {
                for (let i = 1; i < row.length; i++) values.push(row[i]);
            });
            const n = values.length;
            const sum = values.reduce((a, b) => a + b, 0);
            const mean = sum / n;
            const variance = values.reduce((s, v) => s + (v - mean) ** 2, 0) / n;
            return { mean, std: Math.sqrt(variance) };
        }

        function computeCountStats(num) {
            const data = countData[num];
            const values = [];
            data.goods.forEach(row => {
                for (let i = 1; i < row.length; i++) {
                    const v = row[i];
                    if (v > 0) values.push(v);
                }
            });
            if (values.length < 3) return null;
            const logVals = values.map(v => Math.log(v));
            const n = logVals.length;
            const sum = logVals.reduce((a, b) => a + b, 0);
            const mean = sum / n;
            const variance = logVals.reduce((s, v) => s + (v - mean) ** 2, 0) / n;
            return { mean, std: Math.sqrt(variance) };
        }

        const costStats = {};
        for (const num in costData) costStats[num] = computeCostStats(num);
        const countStats = {};
        for (const num in countData) countStats[num] = computeCountStats(num);

        function rgbStr(r, g, b) {
            return 'rgb(' + r + ',' + g + ',' + b + ')';
        }

        function lerpColor(c1, c2, t) {
            return {
                r: Math.round(c1[0] + (c2[0] - c1[0]) * t),
                g: Math.round(c1[1] + (c2[1] - c1[1]) * t),
                b: Math.round(c1[2] + (c2[2] - c1[2]) * t)
            };
        }

        function isLight(r, g, b) {
            return (0.299 * r + 0.587 * g + 0.114 * b) / 255 > 0.5;
        }

        const COST_GREEN = [46, 125, 50];
        const COST_AMBER = [255, 143, 0];
        const COST_RED = [139, 0, 0];
        const COUNT_LIGHT = [232, 240, 254];
        const COUNT_DARK = [13, 71, 161];

        function costColor(val, stats) {
            if (!stats || stats.std === 0) return null;
            const z = (val - stats.mean) / stats.std;
            const t = Math.max(0, Math.min(1, (z + 1.5) / 3));
            const c = t < 0.5
                ? lerpColor(COST_GREEN, COST_AMBER, t / 0.5)
                : lerpColor(COST_AMBER, COST_RED, (t - 0.5) / 0.5);
            return { r: c.r, g: c.g, b: c.b };
        }

        function countColor(val, stats) {
            if (val === 0) return null;
            if (!stats || stats.std === 0) {
                const t = Math.min(val / 535, 1);
                const c = lerpColor(COUNT_LIGHT, COUNT_DARK, t);
                return { r: c.r, g: c.g, b: c.b };
            }
            const z = (Math.log(val) - stats.mean) / stats.std;
            const t = Math.max(0, Math.min(1, (z + 2) / 4));
            const c = lerpColor(COUNT_LIGHT, COUNT_DARK, t);
            return { r: c.r, g: c.g, b: c.b };
        }

        function renderCostTable(num) {
            const data = costData[num];
            if (!data) return "";
            let html = '<table class="cost-table"><thead><tr><th>Товар</th>';
            data.markets.forEach(m => html += "<th>" + m + "</th>");
            html += "</tr></thead><tbody>";
            data.goods.forEach(row => {
                html += "<tr><td>" + row[0] + "</td>";
                for (let i = 1; i < row.length; i++) {
                    const v = row[i];
                    const c = costColor(v, costStats[num]);
                    let style = '';
                    if (c) {
                        const bg = rgbStr(c.r, c.g, c.b);
                        const color = isLight(c.r, c.g, c.b) ? '#333' : '#fff';
                        style = ' style="background:' + bg + ';color:' + color + ';"';
                    }
                    html += "<td" + style + ">" + v + "</td>";
                }
                html += "</tr>";
            });
            html += "</tbody></table>";
            return html;
        }

        function renderCountTable(num) {
            const data = countData[num];
            if (!data) return "";
            let html = '<table class="cost-table"><thead><tr><th>Товар</th>';
            data.markets.forEach(m => html += "<th>" + m + "</th>");
            html += "</tr></thead><tbody>";
            data.goods.forEach(row => {
                html += "<tr><td>" + row[0] + "</td>";
                for (let i = 1; i < row.length; i++) {
                    const v = row[i];
                    const c = countColor(v, countStats[num]);
                    let style = '';
                    if (c) {
                        const bg = rgbStr(c.r, c.g, c.b);
                        const color = isLight(c.r, c.g, c.b) ? '#333' : '#fff';
                        style = ' style="background:' + bg + ';color:' + color + ';"';
                    } else {
                        style = ' style="color:#bbb;"';
                    }
                    html += "<td" + style + ">" + v + "</td>";
                }
                html += "</tr>";
            });
            html += "</tbody></table>";
            return html;
        }

        function showTurn(t) {
            const n = String(t.num);
            if (t.cost) {
                costImg.src = "img/trade/cost/" + n + "cost.jpg";
                costImg.style.display = "block";
            } else {
                costImg.style.display = "none";
            }
            if (t.count) {
                countImg.src = "img/trade/count/" + n + "count.png";
                countImg.style.display = "block";
            } else {
                countImg.style.display = "none";
            }

            const existingCostTable = costContainer.querySelector(".cost-table");
            if (existingCostTable) existingCostTable.remove();
            const costTableHtml = renderCostTable(t.num);
            if (costTableHtml) {
                costContainer.insertAdjacentHTML("beforeend", costTableHtml);
            }

            const existingCountTable = countContainer.querySelectorAll(".cost-table");
            // remove all tables from countContainer
            existingCountTable.forEach(el => el.remove());
            const countTableHtml = renderCountTable(t.num);
            if (countTableHtml) {
                countContainer.insertAdjacentHTML("beforeend", countTableHtml);
            }
        }

        function computeMissing() {
            const lookup = {};
            turns.forEach(t => lookup[t.num] = t);
            const maxTurn = Math.max(...turns.map(t => t.num));
            const missingCost = [];
            const missingCount = [];
            for (let i = 1; i <= maxTurn; i++) {
                if (!lookup[i] || !lookup[i].cost) missingCost.push(i);
                if (!lookup[i] || !lookup[i].count) missingCount.push(i);
            }
            document.getElementById("missingInfo").innerHTML =
                '<p class="missing-line">Отсутствуют файлы цен в ходах: ' + missingCost.join(", ") + '</p>' +
                '<p class="missing-line">Отсутствуют файлы товаров в ходах: ' + missingCount.join(", ") + '</p>';
        }
        computeMissing();

        const defaultTurn = turns.find(t => t.num === 10) || turns[0];
        showTurn(defaultTurn);
