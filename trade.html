<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <title>Торговля</title>
    <style>
        .trade-images {
            display: flex;
            gap: 170px;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        .trade-image-block {
            flex: 0 0 calc(33.33% - 14px);
            min-width: 120px;
        }
        .trade-image-block h3 {
            background: #3F4137;
            color: #fdc073;
            padding: 5px 10px;
            margin: 0 0 10px 0;
            font-size: 15px;
        }
        .trade-image-block img {
            width: 100%;
            border: 1px solid #bcbcbc;
        }
        .no-data {
            color: #999;
            font-style: italic;
            padding: 40px;
            text-align: center;
        }
        .disclaimer {
            background: #fff3cd;
            border-left: 4px solid #ffc107;
            padding: 10px 16px;
            margin: 12px 0;
            font-size: 15px;
        }
        .missing-line {
            font-size: 14px;
            margin: 2px 0;
            color: #666;
        }
        .cost-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
            font-size: 13px;
        }
        .cost-table th, .cost-table td {
            border: 1px solid #bcbcbc;
            padding: 4px 6px;
            text-align: center;
        }
        .cost-table th {
            background: #3F4137;
            color: #fdc073;
            font-size: 12px;
        }
        .cost-table td:first-child {
            text-align: left;
            font-weight: bold;
            background: #f5f5f0;
        }
        .cost-table tbody tr:hover {
            background: #fff8e1;
        }
    </style>
</head>
<body>
    <header>
        <ul class="mainmenu">
            <li><a href="rules/contents.html">Правила</a></li>
            <li><a href="turns.html">Ходы</a></li>
            <li><a href="maps.html">Карты</a></li>
            <li><a href="tables.html">Таблицы</a></li>
            <li><a href="trade.html">Торговля</a></li>
            <li><a href="tools.html">Инструменты</a></li>
            <li><a href="links.html">Ссылки</a></li>
            <li><a href="log.html">Лог</a></li>
        </ul>
    </header>

    <p class="disclaimer">⚠ Проверка данных в процессе, возможны ошибки.</p>

    <div id="missingInfo"></div>

    <div style="padding:10px 10px 0; display:flex; gap:8px; flex-wrap:wrap;">
        <a href="trade-price.html" class="btn" style="flex:0 1 auto; text-decoration:none;">График цен</a>
        <a href="trade-count.html" class="btn" style="flex:0 1 auto; text-decoration:none;">График предложения товара</a>
        <a href="trade-combined.html" class="btn" style="flex:0 1 auto; text-decoration:none;">Комбинированный график</a>
    </div>

    <hr style="border:none; border-top:1px solid #ccc; margin:8px 10px 4px;">

    <div id="turnNav" style="padding: 10px; display: flex; flex-wrap: wrap; gap: 5px;"></div>

    <div class="trade-images">
        <div class="trade-image-block">
            <h3>Цены</h3>
            <div id="costContainer"><img id="costImg" src="" alt="Стоимость"></div>
        </div>
        <div class="trade-image-block">
            <h3>Количество в ТЦ</h3>
            <div id="countContainer"><img id="countImg" src="" alt="Количество товаров"></div>
        </div>
    </div>

    <script src="trade-data.js"></script>
    <script>
        const turns = [
            {num: 6, cost: false, count: true},
            {num: 7, cost: false, count: true},
            {num: 8, cost: false, count: true},
            {num: 9, cost: true, count: false},
            {num: 10, cost: true, count: true},
            {num: 11, cost: false, count: true},
            {num: 12, cost: true, count: true},
            {num: 13, cost: true, count: true},
            {num: 14, cost: true, count: true},
            {num: 15, cost: true, count: true},
            {num: 16, cost: true, count: true},
            {num: 17, cost: false, count: true},
            {num: 18, cost: true, count: true},
            {num: 19, cost: true, count: true},
            {num: 20, cost: true, count: false},
            {num: 21, cost: true, count: true},
            {num: 22, cost: true, count: true},
            {num: 23, cost: true, count: true},
            {num: 24, cost: true, count: true},
            {num: 25, cost: true, count: true},
            {num: 26, cost: true, count: true},
            {num: 27, cost: true, count: true},
            {num: 28, cost: true, count: true}
        ];

        const nav = document.getElementById("turnNav");
        const costImg = document.getElementById("costImg");
        const countImg = document.getElementById("countImg");
        const costContainer = document.getElementById("costContainer");
        const countContainer = document.getElementById("countContainer");

        turns.forEach(t => {
            const btn = document.createElement("button");
            btn.className = "btn";
            btn.textContent = String(t.num).padStart(2, "0");
            btn.addEventListener("click", () => showTurn(t));
            nav.appendChild(btn);
        });

        // costData and countData now loaded from trade-data.js

        // <!-- trade-viewer -->
        // <!-- depends-on file="trade-data.js" -->
        // <!-- image-set name="cost" path="img/trade/cost/<turn>cost.jpg" format="jpg" -->
        // <!-- image-set name="count" path="img/trade/count/<turn>count.png" format="png" -->
        // <!-- element id="turnNav" type="div" description="Кнопки выбора хода" -->
        // <!-- element id="costImg" type="img" description="Изображение цен для выбранного хода" -->
        // <!-- element id="countImg" type="img" description="Изображение количества товаров" -->
        // <!-- element id="costContainer" type="div" description="Таблица цен" -->
        // <!-- element id="countContainer" type="div" description="Таблица количества товаров" -->
        // <!-- /trade-viewer -->

        function computeCostStats(num) {
            const data = costData[num];
            const values = [];
            data.goods.forEach(row => {
                for (let i = 1; i < row.length; i++) values.push(row[i]);
            });
            const n = values.length;
            const sum = values.reduce((a, b) => a + b, 0);
            const mean = sum / n;
            const variance = values.reduce((s, v) => s + (v - mean) ** 2, 0) / n;
            return { mean, std: Math.sqrt(variance) };
        }

        function computeGlobalCountLogStats() {
            const allLogVals = [];
            for (const num in countData) {
                countData[num].goods.forEach(row => {
                    for (let i = 1; i < row.length; i++) {
                        if (row[i] > 0) allLogVals.push(Math.log(row[i]));
                    }
                });
            }
            const n = allLogVals.length;
            const sum = allLogVals.reduce((a, b) => a + b, 0);
            const mean = sum / n;
            const variance = allLogVals.reduce((s, v) => s + (v - mean) ** 2, 0) / n;
            return { mean, std: Math.sqrt(variance) };
        }

        const costStats = {};
        for (const num in costData) costStats[num] = computeCostStats(num);
        const countLogStats = computeGlobalCountLogStats();

        function rgbStr(r, g, b) {
            return 'rgb(' + r + ',' + g + ',' + b + ')';
        }

        function lerpColor(c1, c2, t) {
            return {
                r: Math.round(c1[0] + (c2[0] - c1[0]) * t),
                g: Math.round(c1[1] + (c2[1] - c1[1]) * t),
                b: Math.round(c1[2] + (c2[2] - c1[2]) * t)
            };
        }

        function isLight(r, g, b) {
            return (0.299 * r + 0.587 * g + 0.114 * b) / 255 > 0.5;
        }

        const COST_GREEN = [46, 125, 50];
        const COST_AMBER = [255, 143, 0];
        const COST_RED = [139, 0, 0];
        const COUNT_LIGHT = [232, 240, 254];
        const COUNT_DARK = [13, 71, 161];

        function costColor(val, stats) {
            if (!stats || stats.std === 0) return null;
            const z = (val - stats.mean) / stats.std;
            const t = Math.max(0, Math.min(1, (z + 1.5) / 3));
            const c = t < 0.5
                ? lerpColor(COST_GREEN, COST_AMBER, t / 0.5)
                : lerpColor(COST_AMBER, COST_RED, (t - 0.5) / 0.5);
            return { r: c.r, g: c.g, b: c.b };
        }

        function countColor(val) {
            if (val === 0) return null;
            const z = (Math.log(val) - countLogStats.mean) / countLogStats.std;
            const t = Math.max(0, Math.min(1, (z + 2) / 4));
            const c = lerpColor(COUNT_LIGHT, COUNT_DARK, t);
            return { r: c.r, g: c.g, b: c.b };
        }

        function renderCostTable(num) {
            const data = costData[num];
            if (!data) return "";
            let html = '<table class="cost-table"><thead><tr><th>Товар</th>';
            data.markets.forEach(m => html += "<th>" + m + "</th>");
            html += "</tr></thead><tbody>";
            data.goods.forEach(row => {
                html += "<tr><td>" + row[0] + "</td>";
                for (let i = 1; i < row.length; i++) {
                    const v = row[i];
                    const c = costColor(v, costStats[num]);
                    let style = '';
                    if (c) {
                        const bg = rgbStr(c.r, c.g, c.b);
                        const color = isLight(c.r, c.g, c.b) ? '#333' : '#fff';
                        style = ' style="background:' + bg + ';color:' + color + ';"';
                    }
                    html += "<td" + style + ">" + v + "</td>";
                }
                html += "</tr>";
            });
            html += "</tbody></table>";
            return html;
        }

        function renderCountTable(num) {
            const data = countData[num];
            if (!data) return "";
            let html = '<table class="cost-table"><thead><tr><th>Товар</th>';
            data.markets.forEach(m => html += "<th>" + m + "</th>");
            html += "</tr></thead><tbody>";
            data.goods.forEach(row => {
                html += "<tr><td>" + row[0] + "</td>";
                for (let i = 1; i < row.length; i++) {
                    const v = row[i];
                    const c = countColor(v);
                    let style = '';
                    if (c) {
                        const bg = rgbStr(c.r, c.g, c.b);
                        const color = isLight(c.r, c.g, c.b) ? '#333' : '#fff';
                        style = ' style="background:' + bg + ';color:' + color + ';"';
                    } else {
                        style = ' style="color:#bbb;"';
                    }
                    html += "<td" + style + ">" + v + "</td>";
                }
                html += "</tr>";
            });
            html += "</tbody></table>";
            return html;
        }

        function showTurn(t) {
            const n = String(t.num);
            if (t.cost) {
                costImg.src = "img/trade/cost/" + n + "cost.jpg";
                costImg.style.display = "block";
            } else {
                costImg.style.display = "none";
            }
            if (t.count) {
                countImg.src = "img/trade/count/" + n + "count.png";
                countImg.style.display = "block";
            } else {
                countImg.style.display = "none";
            }

            const existingCostTable = costContainer.querySelector(".cost-table");
            if (existingCostTable) existingCostTable.remove();
            const costTableHtml = renderCostTable(t.num);
            if (costTableHtml) {
                costContainer.insertAdjacentHTML("beforeend", costTableHtml);
            }

            const existingCountTable = countContainer.querySelectorAll(".cost-table");
            // remove all tables from countContainer
            existingCountTable.forEach(el => el.remove());
            const countTableHtml = renderCountTable(t.num);
            if (countTableHtml) {
                countContainer.insertAdjacentHTML("beforeend", countTableHtml);
            }
        }

        function computeMissing() {
            const lookup = {};
            turns.forEach(t => lookup[t.num] = t);
            const maxTurn = Math.max(...turns.map(t => t.num));
            const missingCost = [];
            const missingCount = [];
            for (let i = 1; i <= maxTurn; i++) {
                if (!lookup[i] || !lookup[i].cost) missingCost.push(i);
                if (!lookup[i] || !lookup[i].count) missingCount.push(i);
            }
            document.getElementById("missingInfo").innerHTML =
                '<p class="missing-line">Отсутствуют файлы цен в ходах: ' + missingCost.join(", ") + '</p>' +
                '<p class="missing-line">Отсутствуют файлы товаров в ходах: ' + missingCount.join(", ") + '</p>';
        }
        computeMissing();

        const defaultTurn = turns.find(t => t.num === 10) || turns[0];
        showTurn(defaultTurn);
    </script>
<script src="analytics.js"></script>
</body>
</html>
